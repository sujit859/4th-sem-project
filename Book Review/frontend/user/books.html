<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Books - BookReview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>📚 BookReview</h2>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html" class="active">Books</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
                <li><a href="register.html" class="btn-register">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="books-page">
        <div class="container">
            <div class="page-header">
                <h1>All Books</h1>
                <p>Discover amazing books from our collection</p>
            </div>

            <div class="books-layout">
                <!-- Sidebar Filters -->
                <aside class="filters-sidebar">
                    <h3>Filters</h3>
                    
                    <div class="filter-group">
                        <label for="search-title">Search by Title</label>
                        <input type="text" id="search-title" placeholder="Book title...">
                    </div>

                    <div class="filter-group">
                        <label for="search-author">Search by Author</label>
                        <input type="text" id="search-author" placeholder="Author name...">
                    </div>

                    <div class="filter-group">
                        <label for="genre-filter">Genre</label>
                        <select id="genre-filter">
                            <option value="">All Genres</option>
                        </select>
                    </div>

                    <button class="btn-reset-filters" onclick="resetFilters()">Reset Filters</button>
                </aside>

                <!-- Books Grid -->
                <div class="books-main">
                    <div class="books-grid" id="booksGrid">
                        <div class="loading">Loading books...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';
        let allBooks = [];
        
        // Check login status for navbar
        function updateNavbar() {
            const user = localStorage.getItem('user');
            const navLinks = document.getElementById('navLinks');
            
            if (user) {
                const userData = JSON.parse(user);
                navLinks.innerHTML = `
                    <li><a href="index.html">Home</a></li>
                    <li><a href="books.html" class="active">Books</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="reviews.html">Reviews</a></li>
                    <li><a href="#" onclick="logout()" class="btn-logout">Logout (${userData.username})</a></li>
                `;
            }
        }
        
        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Fetch books from API
        async function fetchBooks() {
            try {
                const response = await fetch(`${API_BASE_URL}/books/`);
                const data = await response.json();
                
                if (response.ok) {
                    allBooks = data.books;
                    populateGenres();
                    displayBooks(allBooks);
                    checkUrlParams();
                } else {
                    document.getElementById('booksGrid').innerHTML = '<div class="error">Failed to load books. Please try again.</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('booksGrid').innerHTML = '<div class="error">Cannot connect to server. Make sure backend is running on port 8000</div>';
            }
        }
        
        // Populate genre filter dropdown
        function populateGenres() {
            const genres = [...new Set(allBooks.map(book => book.genre))];
            const genreFilter = document.getElementById('genre-filter');
            
            genreFilter.innerHTML = '<option value="">All Genres</option>';
            
            genres.forEach(genre => {
                const option = document.createElement('option');
                option.value = genre;
                option.textContent = genre;
                genreFilter.appendChild(option);
            });
        }
        
        // Display books in grid
        function displayBooks(books) {
            const booksGrid = document.getElementById('booksGrid');
            
            if (books.length === 0) {
                booksGrid.innerHTML = '<div class="no-books">No books found matching your criteria.</div>';
                return;
            }
            
            booksGrid.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-cover">
                        <img src="${book.cover_url || 'https://via.placeholder.com/200x300?text=No+Cover'}" alt="${escapeHtml(book.title)}">
                    </div>
                    <div class="book-info">
                        <h3>${escapeHtml(book.title)}</h3>
                        <p class="author">${escapeHtml(book.author)}</p>
                        <div class="rating">
                            <div class="stars">
                                ${generateStars(book.avg_rating || 0)}
                            </div>
                            <span class="rating-value">${(book.avg_rating || 0).toFixed(1)}</span>
                        </div>
                        <p class="genre">${escapeHtml(book.genre)}</p>
                        <a href="book-detail.html?id=${book.id}" class="btn-details">Read Reviews</a>
                    </div>
                </div>
            `).join('');
        }
        
        // Generate star rating HTML
        function generateStars(rating) {
            let stars = '';
            const rounded = Math.round(rating);
            for (let i = 1; i <= 5; i++) {
                if (i <= rounded) {
                    stars += '<span class="star filled">★</span>';
                } else {
                    stars += '<span class="star">★</span>';
                }
            }
            return stars;
        }
        
        // Filter books
        function filterBooks() {
            const title = document.getElementById('search-title').value.toLowerCase();
            const author = document.getElementById('search-author').value.toLowerCase();
            const genre = document.getElementById('genre-filter').value;
            
            let filtered = allBooks;
            
            if (title) {
                filtered = filtered.filter(book => 
                    book.title.toLowerCase().includes(title) || 
                    book.author.toLowerCase().includes(title)
                );
            }
            if (author) {
                filtered = filtered.filter(book => book.author.toLowerCase().includes(author));
            }
            if (genre) {
                filtered = filtered.filter(book => book.genre === genre);
            }
            
            displayBooks(filtered);
        }
        
        function resetFilters() {
            document.getElementById('search-title').value = '';
            document.getElementById('search-author').value = '';
            document.getElementById('genre-filter').value = '';
            displayBooks(allBooks);
        }

        function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const searchParam = urlParams.get('search');
            if (searchParam) {
                document.getElementById('search-title').value = searchParam;
                filterBooks();
            }
        }
        
        // Event listeners
        document.getElementById('search-title').addEventListener('input', filterBooks);
        document.getElementById('search-author').addEventListener('input', filterBooks);
        document.getElementById('genre-filter').addEventListener('change', filterBooks);
        
        // Initialize
        updateNavbar();
        fetchBooks();
    </script>
</body>
</html>
