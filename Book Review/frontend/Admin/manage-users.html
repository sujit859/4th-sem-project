<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>📚 BookReview</h2>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="admin-dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="manage-books.html" class="nav-item">📖 Manage Books</a>
                <a href="manage-users.html" class="nav-item active">👥 Manage Users</a>
                <a href="manage-reviews.html" class="nav-item">⭐ Manage Reviews</a>
                <a href="../user/login.html" class="nav-item logout">🚪 Logout</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>Manage Users</h1>
            </div>

            <div class="search-filter-bar">
                <input type="text" id="searchInput" placeholder="Search users by name or email..." class="search-input">
                <select id="statusFilter" class="filter-select">
                    <option value="">All Statuses</option>
                    <option value="active">Active</option>
                    <option value="suspended">Suspended</option>
                </select>
            </div>

            <div class="data-table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Reviews</th>
                            <th>Status</th>
                            <th>Joined Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center;">Loading users...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';
        let allUsers = [];

        function getToken() {
            return localStorage.getItem('token');
        }

        function isAdminLoggedIn() {
            const user = localStorage.getItem('user');
            if (user) {
                const userData = JSON.parse(user);
                return userData.role === 'admin';
            }
            return false;
        }

        function checkAdminAuth() {
            if (!isAdminLoggedIn()) {
                alert('Please login as admin to access this page');
                window.location.href = '../user/login.html';
            }
        }

        async function fetchUsers() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/users/`, {
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });
                
                const data = await response.json();
                if (response.ok) {
                    allUsers = data.users || [];
                    displayUsers(allUsers);
                } else {
                    document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="8" style="text-align: center; color: red;">Failed to load users</td></tr>';
                }
            } catch (error) {
                console.error('Error fetching users:', error);
                document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="8" style="text-align: center; color: red;">Error connecting to server</td></tr>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No users found</td></tr>';
                return;
            }
            
            const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
            
            tbody.innerHTML = users.map(user => {
                const isSelf = user.id === currentUser.id;
                const statusClass = user.status === 'active' ? 'status-active' : 'status-suspended';
                const statusText = user.status.charAt(0).toUpperCase() + user.status.slice(1);
                
                let actionButtons = '';
                if (!isSelf) {
                    const toggleText = user.status === 'active' ? 'Suspend' : 'Activate';
                    const btnClass = user.status === 'active' ? 'btn-suspend' : 'btn-activate';
                    
                    actionButtons = `
                        <button class="${btnClass}" onclick="toggleUserStatus(${user.id})">${toggleText}</button>
                        <button class="btn-delete" onclick="deleteUser(${user.id})">Delete</button>
                    `;
                    
                    // Show "Make Admin" button if target user role is 'user'
                    if (user.role === 'user') {
                        actionButtons += `
                            <button class="btn-primary" style="padding: 5px 12px; font-size: 0.85rem; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));" onclick="promoteToAdmin(${user.id})">Make Admin</button>
                        `;
                    }
                    
                    // Show "Demote to User" button if target user role is 'admin'
                    if (user.role === 'admin') {
                        actionButtons += `
                            <button class="btn-activate" style="padding: 5px 12px; font-size: 0.85rem; background: #6c757d; color: white;" onclick="demoteToUser(${user.id})">Demote to User</button>
                        `;
                    }
                } else {
                    actionButtons = '<span style="color: #666; font-style: italic;">You (Current Admin)</span>';
                }
                
                return `
                    <tr>
                        <td>${user.id}</td>
                        <td><strong>${escapeHtml(user.username)}</strong></td>
                        <td>${escapeHtml(user.email)}</td>
                        <td style="vertical-align: middle;"><span class="user-role-badge ${user.role}">${user.role.toUpperCase()}</span></td>
                        <td>${user.reviews_count}</td>
                        <td><span class="${statusClass}">${statusText}</span></td>
                        <td>${user.join_date}</td>
                        <td>${actionButtons}</td>
                    </tr>
                `;
            }).join('');
        }

        window.promoteToAdmin = async function(userId) {
            if (confirm('Are you sure you want to promote this user to Admin?')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/admin/users/${userId}/make-admin/`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${getToken()}`
                        }
                    });
                    
                    const data = await response.json();
                    if (response.ok && data.success) {
                        alert(data.message || 'User promoted to Admin successfully!');
                        fetchUsers();
                    } else {
                        alert(data.message || 'Failed to promote user');
                    }
                } catch (error) {
                    console.error('Error promoting user:', error);
                    alert('Error promoting user');
                }
            }
        };

        window.demoteToUser = async function(userId) {
            if (confirm('Are you sure you want to demote this Admin to a normal User?')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/admin/users/${userId}/demote-to-user/`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${getToken()}`
                        }
                    });
                    
                    const data = await response.json();
                    if (response.ok && data.success) {
                        alert(data.message || 'User demoted successfully!');
                        fetchUsers();
                    } else {
                        alert(data.message || 'Failed to demote user');
                    }
                } catch (error) {
                    console.error('Error demoting user:', error);
                    alert('Error demoting user');
                }
            }
        };


        window.toggleUserStatus = async function(userId) {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/users/${userId}/toggle-status/`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    alert(`User status changed to ${data.status}!`);
                    fetchUsers();
                } else {
                    alert(data.message || 'Failed to update user status');
                }
            } catch (error) {
                console.error('Error toggling user status:', error);
                alert('Error updating user status');
            }
        };

        window.deleteUser = async function(userId) {
            if (confirm('Are you sure you want to delete this user? This will also delete all of their reviews.')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/admin/users/${userId}/`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${getToken()}`
                        }
                    });
                    
                    if (response.ok) {
                        alert('User deleted successfully!');
                        fetchUsers();
                    } else {
                        alert('Failed to delete user');
                    }
                } catch (error) {
                    console.error('Error deleting user:', error);
                    alert('Error deleting user');
                }
            }
        };

        function filterUsers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            
            let filtered = allUsers;
            if (search) {
                filtered = filtered.filter(u => 
                    u.username.toLowerCase().includes(search) || 
                    u.email.toLowerCase().includes(search)
                );
            }
            if (status) {
                filtered = filtered.filter(u => u.status === status);
            }
            displayUsers(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterUsers);
        document.getElementById('statusFilter').addEventListener('change', filterUsers);

        // Initialize
        checkAdminAuth();
        fetchUsers();
    </script>
</body>
</html>
