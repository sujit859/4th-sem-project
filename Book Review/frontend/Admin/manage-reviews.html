<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews - Admin</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>📚 BookReview</h2>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="admin-dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="manage-books.html" class="nav-item">📖 Manage Books</a>
                <a href="manage-users.html" class="nav-item">👥 Manage Users</a>
                <a href="manage-reviews.html" class="nav-item active">⭐ Manage Reviews</a>
                <a href="../user/login.html" class="nav-item logout">🚪 Logout</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>Manage Reviews</h1>
                <p>Moderate and delete inappropriate reviews</p>
            </div>

            <div class="search-filter-bar">
                <input type="text" id="searchInput" placeholder="Search reviews by user or book..." class="search-input">
                <select id="filterRating" class="filter-select">
                    <option value="all">All Reviews</option>
                    <option value="5">⭐ 5 Star</option>
                    <option value="4">⭐ 4 Star</option>
                    <option value="3">⭐ 3 Star</option>
                    <option value="2">⭐ 2 Star</option>
                    <option value="1">⭐ 1 Star</option>
                </select>
                <button class="btn-primary" onclick="fetchReviews()">Refresh</button>
            </div>

            <div class="reviews-table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User</th>
                            <th>Book</th>
                            <th>Rating</th>
                            <th>Review</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reviewsTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center;">Loading reviews...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // API Base URL - Change this to your backend URL
        const API_BASE_URL = 'http://localhost:8000/api';
        
        // Get admin token from localStorage
        function getToken() {
            return localStorage.getItem('adminToken') || localStorage.getItem('token');
        }
        
        // Check if admin is logged in
        function isAdminLoggedIn() {
            const user = localStorage.getItem('user');
            if (user) {
                const userData = JSON.parse(user);
                return userData.role === 'admin';
            }
            return false;
        }
        
        // Redirect to login if not admin
        function checkAdminAuth() {
            if (!isAdminLoggedIn()) {
                alert('Please login as admin to access this page');
                window.location.href = '../user/login.html';
            }
        }
        
        // Fetch all reviews from API
        async function fetchReviews() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/reviews/`, {
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });
                
                if (response.status === 401) {
                    alert('Session expired. Please login again.');
                    window.location.href = '../user/login.html';
                    return;
                }
                
                const data = await response.json();
                
                if (response.ok) {
                    displayReviews(data.reviews || []);
                } else {
                    // If API not ready, load sample data for testing
                    loadSampleData();
                }
            } catch (error) {
                console.error('Error fetching reviews:', error);
                // Load sample data for testing when backend is not ready
                loadSampleData();
            }
        }
        
        // Load sample data for testing (when backend is not ready)
        function loadSampleData() {
            const sampleReviews = [
                {
                    id: 1,
                    username: 'john_doe',
                    book_title: 'The Great Gatsby',
                    rating: 5,
                    comment: 'An absolute masterpiece! Highly recommend this classic!',
                    created_at: '2024-03-15'
                },
                {
                    id: 2,
                    username: 'jane_smith',
                    book_title: '1984',
                    rating: 5,
                    comment: 'A chilling and prophetic vision of the future.',
                    created_at: '2024-03-14'
                },
                {
                    id: 3,
                    username: 'mike_johnson',
                    book_title: 'The Hobbit',
                    rating: 4,
                    comment: 'Wonderful adventure story! Great introduction to Middle-earth.',
                    created_at: '2024-03-13'
                },
                {
                    id: 4,
                    username: 'sarah_wilson',
                    book_title: 'Pride and Prejudice',
                    rating: 5,
                    comment: 'Timeless classic! Love the wit and romance.',
                    created_at: '2024-03-12'
                },
                {
                    id: 5,
                    username: 'spam_user',
                    book_title: 'Various Books',
                    rating: 1,
                    comment: 'Inappropriate content - spam review that needs to be deleted.',
                    created_at: '2024-03-11'
                }
            ];
            displayReviews(sampleReviews);
        }
        
        // Display reviews in table
        function displayReviews(reviews) {
            const tbody = document.getElementById('reviewsTableBody');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const ratingFilter = document.getElementById('filterRating').value;
            
            let filteredReviews = reviews;
            
            // Apply search filter
            if (searchTerm) {
                filteredReviews = filteredReviews.filter(review => 
                    review.username.toLowerCase().includes(searchTerm) || 
                    review.book_title.toLowerCase().includes(searchTerm)
                );
            }
            
            // Apply rating filter
            if (ratingFilter !== 'all') {
                filteredReviews = filteredReviews.filter(review => 
                    review.rating === parseInt(ratingFilter)
                );
            }
            
            if (filteredReviews.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No reviews found</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredReviews.map(review => `
                <tr data-review-id="${review.id}">
                    <td>${review.id}</td>
                    <td><strong>${escapeHtml(review.username)}</strong></td>
                    <td>${escapeHtml(review.book_title)}</td>
                    <td>${generateStars(review.rating)}</td>
                    <td class="review-text-cell">${escapeHtml(review.comment.substring(0, 100))}${review.comment.length > 100 ? '...' : ''}</td>
                    <td>${escapeHtml(review.created_at)}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteReview(${review.id})">🗑️ Delete</button>
                        <button class="btn-view" onclick="viewFullReview('${review.id}', '${escapeHtml(review.comment)}')">👁️ View</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // Generate star rating HTML
        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<span style="color: #ffc107;">★</span>';
                } else {
                    stars += '<span style="color: #ddd;">★</span>';
                }
            }
            return stars;
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // View full review
        window.viewFullReview = function(id, comment) {
            alert(`Full Review:\n\n${comment}`);
        };
        
        // Delete review function
        window.deleteReview = async function(reviewId) {
            if (confirm('Are you sure you want to delete this review? This action cannot be undone.')) {
                try {
                    // Try to delete from API first
                    const response = await fetch(`${API_BASE_URL}/admin/reviews/${reviewId}/`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${getToken()}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        alert('Review deleted successfully!');
                        fetchReviews(); // Refresh the list
                    } else if (response.status === 401) {
                        alert('Session expired. Please login again.');
                        window.location.href = '../user/login.html';
                    } else {
                        // If API delete fails, remove from local display (for demo)
                        deleteReviewFromLocal(reviewId);
                    }
                } catch (error) {
                    console.error('Error deleting review:', error);
                    // For demo/testing when backend is not ready
                    deleteReviewFromLocal(reviewId);
                }
            }
        };
        
        // Delete review from local display (for testing without backend)
        function deleteReviewFromLocal(reviewId) {
            const tableBody = document.getElementById('reviewsTableBody');
            const rows = tableBody.getElementsByTagName('tr');
            
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const reviewIdAttr = row.getAttribute('data-review-id');
                if (reviewIdAttr == reviewId) {
                    row.remove();
                    alert('Review deleted from view (demo mode). In production, this would be deleted from database.');
                    break;
                }
            }
            
            // If no rows left, show message
            if (tableBody.getElementsByTagName('tr').length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No reviews found</td></tr>';
            }
        }
        
        // Search and filter event listeners
        document.getElementById('searchInput').addEventListener('input', function() {
            fetchReviews();
        });
        
        document.getElementById('filterRating').addEventListener('change', function() {
            fetchReviews();
        });
        
        // Initialize page
        function init() {
            checkAdminAuth();
            fetchReviews();
        }
        
        init();
    </script>
</body>
</html>
