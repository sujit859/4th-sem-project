<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books - Admin</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>📚 BookReview</h2>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="admin-dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="manage-books.html" class="nav-item active">📖 Manage Books</a>
                <a href="manage-users.html" class="nav-item">👥 Manage Users</a>
                <a href="manage-reviews.html" class="nav-item">⭐ Manage Reviews</a>
                <a href="../user/login.html" class="nav-item logout">🚪 Logout</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>Manage Books</h1>
                <a href="add-book.html" class="btn-primary">+ Add New Book</a>
            </div>

            <!-- Search and Filter -->
            <div class="search-filter-bar">
                <input type="text" id="searchInput" placeholder="Search books by title, author..." class="search-input">
                <select id="genreFilter" class="filter-select">
                    <option value="">All Genres</option>
                    <option value="Fiction">Fiction</option>
                    <option value="Classic">Classic</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Dystopian">Dystopian</option>
                    <option value="Romance">Romance</option>
                    <option value="Mystery">Mystery</option>
                    <option value="Science Fiction">Science Fiction</option>
                </select>
            </div>

            <!-- Books Table -->
            <div class="data-table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cover</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Genre</th>
                            <th>Rating</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center;">Loading books...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';
        let allBooks = [];

        function getToken() {
            return localStorage.getItem('token');
        }

        function isAdminLoggedIn() {
            const user = localStorage.getItem('user');
            if (user) {
                const userData = JSON.parse(user);
                return userData.role === 'admin';
            }
            return false;
        }

        function checkAdminAuth() {
            if (!isAdminLoggedIn()) {
                alert('Please login as admin to access this page');
                window.location.href = '../user/login.html';
            }
        }

        async function fetchBooks() {
            try {
                const response = await fetch(`${API_BASE_URL}/books/`);
                const data = await response.json();
                
                if (response.ok) {
                    allBooks = data.books || [];
                    displayBooks(allBooks);
                } else {
                    document.getElementById('booksTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Failed to load books</td></tr>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('booksTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Error connecting to server</td></tr>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function displayBooks(books) {
            const tbody = document.getElementById('booksTableBody');
            
            if (books.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No books found</td></tr>';
                return;
            }
            
            tbody.innerHTML = books.map(book => `
                <tr>
                    <td>${book.id}</td>
                    <td><img src="${book.cover_url || 'https://via.placeholder.com/50x70?text=No+Cover'}" class="table-thumb" alt="Cover"></td>
                    <td><strong>${escapeHtml(book.title)}</strong></td>
                    <td>${escapeHtml(book.author)}</td>
                    <td><span class="genre-badge">${escapeHtml(book.genre)}</span></td>
                    <td>${book.avg_rating.toFixed(1)} ★</td>
                    <td>
                        <a href="edit-book.html?id=${book.id}" class="btn-edit">Edit</a>
                        <button class="btn-delete" onclick="deleteBook(${book.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        window.deleteBook = async function(bookId) {
            if (confirm('Are you sure you want to delete this book? This will also delete all of its reviews.')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/books/${bookId}/`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${getToken()}`
                        }
                    });
                    
                    if (response.ok) {
                        alert('Book deleted successfully!');
                        fetchBooks();
                    } else {
                        alert('Failed to delete book');
                    }
                } catch (error) {
                    console.error('Error deleting book:', error);
                    alert('Error deleting book');
                }
            }
        };

        function filterBooks() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            
            let filtered = allBooks;
            if (search) {
                filtered = filtered.filter(b => 
                    b.title.toLowerCase().includes(search) || 
                    b.author.toLowerCase().includes(search)
                );
            }
            if (genre) {
                filtered = filtered.filter(b => b.genre === genre);
            }
            displayBooks(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterBooks);
        document.getElementById('genreFilter').addEventListener('change', filterBooks);

        // Initialize
        checkAdminAuth();
        fetchBooks();
    </script>
</body>
</html>
