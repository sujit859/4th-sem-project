<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - BookReview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>📚 BookReview</h2>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
                <li><a href="register.html" class="btn-register">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="book-detail-container">
        <div class="container">
            <div id="bookContent">
                <div class="loading">Loading book details...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Get book ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');
        
        function getToken() {
            return localStorage.getItem('token');
        }
        
        function getCurrentUser() {
            const user = localStorage.getItem('user');
            return user ? JSON.parse(user) : null;
        }
        
        function updateNavbar() {
            const user = getCurrentUser();
            const navLinks = document.getElementById('navLinks');
            
            if (user) {
                navLinks.innerHTML = `
                    <li><a href="index.html">Home</a></li>
                    <li><a href="books.html">Books</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="reviews.html">Reviews</a></li>
                    <li><a href="#" onclick="logout()" class="btn-logout">Logout (${user.username})</a></li>
                `;
            }
        }
        
        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        async function fetchBookDetails() {
            try {
                const response = await fetch(`${API_BASE_URL}/books/${bookId}/`);
                const data = await response.json();
                
                if (response.ok) {
                    displayBookDetails(data.book);
                    fetchReviews();
                } else {
                    document.getElementById('bookContent').innerHTML = '<div class="error">Book not found</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('bookContent').innerHTML = '<div class="error">Cannot connect to server</div>';
            }
        }
        
        function displayBookDetails(book) {
            document.getElementById('bookContent').innerHTML = `
                <div class="book-header">
                    <div class="book-cover-large">
                        <img src="${book.cover_url || 'https://via.placeholder.com/300x450?text=No+Cover'}" alt="${escapeHtml(book.title)}">
                    </div>
                    <div class="book-info-large">
                        <h1>${escapeHtml(book.title)}</h1>
                        <p class="author-name">by ${escapeHtml(book.author)}</p>
                        <div class="book-meta">
                            <span class="genre-badge">${escapeHtml(book.genre)}</span>
                            <span class="year-badge">${escapeHtml(book.published_date) || 'N/A'}</span>
                        </div>
                        <div class="rating-large">
                            <div class="stars">
                                ${generateStars(book.avg_rating || 0)}
                            </div>
                            <span class="rating-value">${(book.avg_rating || 0).toFixed(1)} out of 5</span>
                            <span class="review-count">(${book.total_reviews || 0} reviews)</span>
                        </div>
                        <div class="book-description">
                            <h3>Description</h3>
                            <p>${escapeHtml(book.description) || 'No description available.'}</p>
                        </div>
                    </div>
                </div>
                
                <div class="add-review-section" id="addReviewSection">
                    <h3>Write a Review</h3>
                    <div id="loginRequiredMessage" style="display: none; text-align: center; padding: 20px; background: #f0f0f0; border-radius: 10px;">
                        <p>Please login to write a review</p>
                        <a href="login.html" class="btn-primary">Login Now</a>
                        <a href="register.html" class="btn-secondary">Create Account</a>
                    </div>
                    <form class="review-form" id="reviewForm" style="display: none;">
                        <div class="form-group">
                            <label>Your Rating</label>
                            <div class="star-rating-input">
                                ${[1,2,3,4,5].map(i => `<span class="star-input" data-rating="${i}">★</span>`).join('')}
                            </div>
                            <input type="hidden" id="selectedRating" value="0">
                        </div>
                        <div class="form-group">
                            <label>Your Review</label>
                            <textarea id="reviewText" rows="4" placeholder="Share your thoughts about this book..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit-review">Submit Review</button>
                    </form>
                </div>
                
                <div class="reviews-section">
                    <h3>Reader Reviews</h3>
                    <div id="reviewsList">Loading reviews...</div>
                </div>
            `;
            
            // Setup star rating inputs
            document.querySelectorAll('.star-input').forEach(star => {
                star.addEventListener('click', function() {
                    const rating = this.getAttribute('data-rating');
                    document.getElementById('selectedRating').value = rating;
                    document.querySelectorAll('.star-input').forEach(s => {
                        if (s.getAttribute('data-rating') <= rating) {
                            s.style.color = '#ffc107';
                        } else {
                            s.style.color = '#ddd';
                        }
                    });
                });
            });
            
            // Setup review form submission
            document.getElementById('reviewForm')?.addEventListener('submit', submitReview);
            
            // Check login status for review form
            const user = getCurrentUser();
            if (user) {
                document.getElementById('loginRequiredMessage').style.display = 'none';
                document.getElementById('reviewForm').style.display = 'block';
            } else {
                document.getElementById('loginRequiredMessage').style.display = 'block';
                document.getElementById('reviewForm').style.display = 'none';
            }
        }
        
        async function fetchReviews() {
            try {
                const response = await fetch(`${API_BASE_URL}/books/${bookId}/reviews/`);
                const data = await response.json();
                displayReviews(data.reviews);
            } catch (error) {
                document.getElementById('reviewsList').innerHTML = '<div class="error">Failed to load reviews</div>';
            }
        }
        
        function displayReviews(reviews) {
            const currentUser = getCurrentUser();
            const reviewsList = document.getElementById('reviewsList');
            
            if (!reviews || reviews.length === 0) {
                reviewsList.innerHTML = '<p style="text-align: center; color: #666;">No reviews yet. Be the first to review!</p>';
                return;
            }
            
            reviewsList.innerHTML = reviews.map(review => `
                <div class="review-card" data-review-id="${review.id}">
                    <div class="review-header">
                        <div class="reviewer-info">
                            <strong>${escapeHtml(review.username)}</strong>
                            <span class="review-date">${escapeHtml(review.created_at)}</span>
                        </div>
                        ${currentUser && (currentUser.id === review.user_id || currentUser.role === 'admin') ? `
                        <div class="review-actions">
                            <button class="btn-edit" onclick="editReview(${review.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteReview(${review.id})">Delete</button>
                        </div>
                        ` : ''}
                    </div>
                    <div class="review-rating">
                        <div class="stars">
                            ${generateStars(review.rating)}
                        </div>
                    </div>
                    <p class="review-text">${escapeHtml(review.comment)}</p>
                </div>
            `).join('');
        }
        
        async function submitReview(e) {
            e.preventDefault();
            
            const user = getCurrentUser();
            if (!user) {
                alert('Please login to submit a review');
                window.location.href = 'login.html';
                return;
            }
            
            const rating = document.getElementById('selectedRating').value;
            const comment = document.getElementById('reviewText').value;
            
            if (rating === '0') {
                alert('Please select a rating');
                return;
            }
            
            if (!comment.trim()) {
                alert('Please write a review');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/books/${bookId}/reviews/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({
                        rating: parseInt(rating),
                        comment: comment
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Review submitted successfully!');
                    document.getElementById('reviewText').value = '';
                    document.getElementById('selectedRating').value = '0';
                    document.querySelectorAll('.star-input').forEach(s => s.style.color = '#ddd');
                    fetchReviews();
                    fetchBookDetails(); // Refresh average rating
                } else {
                    alert(data.message || 'Failed to submit review');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Cannot connect to server');
            }
        }
        
        window.editReview = async function(reviewId) {
            const newComment = prompt('Edit your review:');
            if (newComment && newComment.trim()) {
                try {
                    const response = await fetch(`${API_BASE_URL}/reviews/${reviewId}/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${getToken()}`
                        },
                        body: JSON.stringify({ comment: newComment })
                    });
                    
                    if (response.ok) {
                        alert('Review updated successfully');
                        fetchReviews();
                    } else {
                        alert('Failed to update review');
                    }
                } catch (error) {
                    alert('Error updating review');
                }
            }
        };
        
        window.deleteReview = async function(reviewId) {
            if (confirm('Are you sure you want to delete this review?')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/reviews/${reviewId}/`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${getToken()}`
                        }
                    });
                    
                    if (response.ok) {
                        alert('Review deleted successfully');
                        fetchReviews();
                        fetchBookDetails();
                    } else {
                        alert('Failed to delete review');
                    }
                } catch (error) {
                    alert('Error deleting review');
                }
            }
        };
        
        function generateStars(rating) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                stars += `<span class="star ${i < rating ? 'filled' : ''}">★</span>`;
            }
            return stars;
        }
        
        // Initialize
        updateNavbar();
        if (bookId) {
            fetchBookDetails();
        } else {
            document.getElementById('bookContent').innerHTML = '<div class="error">No book ID provided</div>';
        }
    </script>
</body>
</html>
